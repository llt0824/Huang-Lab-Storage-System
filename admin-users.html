<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户管理 - 黄永业课题组</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-container {
            max-width: 900px;
            margin: 2rem auto;
            padding: 0 2rem;
        }
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }
        .admin-header h2 {
            color: #1e3a5f;
        }
        .user-management-table {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
        }
        .user-management-table table {
            width: 100%;
            border-collapse: collapse;
        }
        .user-management-table th {
            background: #f8fafd;
            padding: 1rem;
            text-align: left;
            color: #1e3a5f;
            font-weight: 600;
            border-bottom: 2px solid #e2e8f0;
        }
        .user-management-table td {
            padding: 1rem;
            border-bottom: 1px solid #edf2f7;
        }
        .user-management-table tr:hover {
            background: #f7fafc;
        }
        .badge-admin {
            background: #2b5a8c;
            color: white;
            padding: 0.2rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            display: inline-block;
        }
        .badge-user {
            background: #e2e8f0;
            color: #2d3748;
            padding: 0.2rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            display: inline-block;
        }
        .action-link {
            color: #2b5a8c;
            text-decoration: none;
            margin: 0 0.3rem;
            cursor: pointer;
        }
        .action-link:hover {
            text-decoration: underline;
        }
        .action-link.reset {
            color: #f59e0b;
        }
        .action-link.delete {
            color: #dc3545;
        }
        .search-box {
            margin-bottom: 1.5rem;
            display: flex;
            gap: 1rem;
        }
        .search-box input {
            flex: 1;
            padding: 0.8rem 1rem;
            border: 2px solid #dde7f0;
            border-radius: 10px;
            font-size: 1rem;
        }
        .search-box input:focus {
            outline: none;
            border-color: #2b5a8c;
        }
        .stats-card {
            background: white;
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 1.5rem;
            display: flex;
            gap: 2rem;
            border: 1px solid #e2e8f0;
        }
        .stat-item {
            text-align: center;
        }
        .stat-number {
            font-size: 1.8rem;
            font-weight: 600;
            color: #2b5a8c;
        }
        .stat-label {
            color: #4a5f73;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <header class="page-header">
        <div class="header-content">
            <h1>黄永业课题组</h1>
            <p class="subtitle">用户管理（管理员）</p>
        </div>
        <div class="user-info">
            <span id="currentUser">加载中...</span>
            <button class="btn btn-sm" onclick="location.href='homepage.html'">返回主页</button>
            <button class="btn btn-sm btn-logout" onclick="handleLogout()">退出</button>
        </div>
    </header>

    <main class="admin-container">
        <div class="admin-header">
            <h2>👥 系统用户管理</h2>
            <button class="btn btn-primary" onclick="location.href='register.html'">+ 添加新用户</button>
        </div>

        <div class="stats-card" id="userStats">
            <div class="stat-item">
                <div class="stat-number" id="totalUsers">0</div>
                <div class="stat-label">总用户数</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="adminCount">0</div>
                <div class="stat-label">管理员</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="userCount">0</div>
                <div class="stat-label">普通用户</div>
            </div>
        </div>

        <div class="search-box">
            <input type="text" id="search-user" placeholder="搜索用户名、姓名、邮箱..." onkeyup="searchUsers()">
        </div>

        <div class="user-management-table">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>用户名</th>
                        <th>姓名</th>
                        <th>邮箱</th>
                        <th>角色</th>
                        <th>注册日期</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="user-table-body">
                    <!-- 动态加载 -->
                </tbody>
            </table>
        </div>

        <div id="adminMessage" class="message" style="margin-top: 1rem;"></div>
    </main>

    <!-- 重置密码弹窗 -->
    <div id="resetPasswordModal" class="modal" style="display: none;">
        <div class="modal-content" style="max-width: 450px;">
            <div class="modal-header">
                <h3>重置用户密码</h3>
                <span class="close" onclick="hideResetPasswordModal()">&times;</span>
            </div>
            <div class="modal-body">
                <form id="adminResetPasswordForm" onsubmit="return handleAdminResetPasswordSubmit(event)">
                    <input type="hidden" id="reset-user-id">
                    <div class="form-group">
                        <label>用户名</label>
                        <input type="text" id="reset-username" class="form-input" readonly>
                    </div>
                    <div class="form-group">
                        <label>新密码</label>
                        <input type="text" id="admin-new-password" class="form-input" value="123456" required>
                        <small style="color: #666;">默认密码为 123456，可自行修改</small>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">确认重置</button>
                        <button type="button" class="btn btn-secondary" onclick="hideResetPasswordModal()">取消</button>
                    </div>
                </form>
                <div id="adminResetResult" class="message" style="margin-top: 1rem;"></div>
            </div>
        </div>
    </div>

    <footer class="page-footer">
        <div class="footer-content">
            <p>最后更新日期: <span id="lastUpdate"></span></p>
            <p>卢丽婷 · 课题组管理员</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
