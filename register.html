<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 黄永业课题组</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-box">
            <h1 class="lab-title">黄永业课题组</h1>
            <h2>用户注册</h2>
            
            <form id="registerForm" onsubmit="return handleRegister(event)">
                <div class="form-group">
                    <label for="reg-username">用户名 *</label>
                    <input type="text" id="reg-username" class="form-input" required placeholder="请输入用户名">
                </div>
                
                <div class="form-group">
                    <label for="reg-name">真实姓名</label>
                    <input type="text" id="reg-name" class="form-input" placeholder="请输入真实姓名">
                </div>
                
                <div class="form-group">
                    <label for="reg-email">邮箱</label>
                    <input type="email" id="reg-email" class="form-input" placeholder="请输入邮箱">
                </div>
                
                <div class="form-group">
                    <label for="reg-password">密码 *</label>
                    <input type="password" id="reg-password" class="form-input" required placeholder="至少6位" minlength="6">
                </div>
                
                <div class="form-group">
                    <label for="reg-confirm">确认密码 *</label>
                    <input type="password" id="reg-confirm" class="form-input" required placeholder="再次输入密码">
                </div>
                
                <button type="submit" class="btn btn-primary btn-block">注册</button>
                
                <div class="register-link">
                    已有账号？ <a href="index.html">立即登录</a>
                </div>
            </form>
            
            <div id="registerMessage" class="message"></div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
