<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 黄永业课题组</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-box">
            <h1 class="lab-title">黄永业课题组</h1>
            <h2>网格化管理系统</h2>
            
            <form id="loginForm" onsubmit="return handleLogin(event)">
                <div class="form-group">
                    <label for="username">用户名</label>
                    <input type="text" id="username" class="form-input" required placeholder="请输入用户名">
                </div>
                
                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" class="form-input" required placeholder="请输入密码">
                </div>
                
                <div class="form-options">
                    <label class="checkbox-label">
                        <input type="checkbox" id="remember"> 记住密码
                    </label>
                    <a href="#" class="forgot-link" onclick="alert('请联系管理员卢丽婷重置密码')">忘记密码？</a>
                </div>
                
                <button type="submit" class="btn btn-primary btn-block">登录</button>
                
                <div class="register-link">
                    还没有账号？ <a href="register.html">立即注册</a>
                </div>
            </form>
            
            <div id="loginMessage" class="message"></div>
            
            <div class="demo-info">
                <p>测试账号：luliting / 123456</p>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
